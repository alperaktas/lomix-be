<script>
    function formatUptime(seconds) {
        if (!seconds) return '-';
        seconds = Number(seconds);
        const d = Math.floor(seconds / (3600 * 24));
        const h = Math.floor((seconds % (3600 * 24)) / 3600);
        const m = Math.floor((seconds % 3600) / 60);

        let parts = [];
        if (d > 0) parts.push(`${d} gün`);
        if (h > 0) parts.push(`${h} sa`);
        if (m > 0) parts.push(`${m} dk`);

        return parts.length > 0 ? parts.join(' ') : '< 1 dk';
    }

    async function loadAllStats() {
        const token = localStorage.getItem('token');
        const headers = { 'Authorization': 'Bearer ' + token };

        // Kuyruk istatistikleri
        try {
            const queueRes = await fetch('/api/mobile/queue-status', { headers });
            if (queueRes.ok) {
                const stats = await queueRes.json();
                document.getElementById('stat-waiting').innerText = stats.waiting || 0;
                document.getElementById('stat-completed').innerText = stats.completed || 0;
                document.getElementById('stat-failed').innerText = stats.failed || 0;
            } else {
                console.error("Kuyruk istatistikleri çekilemedi");
            }
        } catch (error) {
            console.error("Kuyruk bağlantı hatası:", error);
        }

        // Sunucu istatistikleri
        try {
            const systemRes = await fetch('/api/system/stats', { headers });
            if (systemRes.ok) {
                const stats = await systemRes.json();
                document.getElementById('stat-cpu-load').innerText = `${stats.cpu.load}%`;
                document.getElementById('stat-ram-usage').innerText = `${stats.mem.usage}% (${stats.mem.used} / ${stats.mem.total} GB)`;
                document.getElementById('stat-uptime').innerText = formatUptime(stats.uptime);
            } else {
                console.error("Sunucu istatistikleri çekilemedi");
            }
        } catch (error) {
            console.error("Sunucu bağlantı hatası:", error);
        }

        // Kullanıcı İstatistikleri
        try {
            const userStatsRes = await fetch('/api/users/stats', { headers });
            if (userStatsRes.ok) {
                const stats = await userStatsRes.json();
                document.getElementById('stat-users').innerText = stats.totalUsers || 0;
                document.getElementById('stat-groups').innerText = (stats.groups ? stats.groups.length : 0);
                document.getElementById('stat-roles').innerText = (stats.roles ? stats.roles.length : 0);
            } else {
                console.error("Kullanıcı istatistikleri çekilemedi");
            }
        } catch (error) {
            console.error("Kullanıcı istatistikleri bağlantı hatası:", error);
        }
    }

    loadAllStats();
</script>
